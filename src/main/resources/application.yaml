spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
      database: travel_agent_db
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

travelagent:
  jwt:
    secret: ${JWT_SECRET:travel-agent-dev-secret-key-minimum-256-bits-long!!}
    expiration-ms: 86400000
  cors:
    allowed-origins:
      - http://localhost:3000
